    <path d="M151 151c18-18 44-28 77-28h75c-62 24-112 68-149 132-10-38-11-73-3-104Z" fill="#FFFFFF" opacity=".22"/>
    <path d="M174 370c48 35 104 47 169 34-27 37-61 56-102 56h-28c-27 0-47-10-61-30-11-16-4-39 22-60Z" fill="#FFFFFF" opacity=".16"/>
