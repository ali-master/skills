  <text x="520" y="288" fill="#B8F7FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="650" letter-spacing="0">Agent-ready docs for oRPC and Better Notify</text>
  <text x="520" y="354" fill="#D9E4EC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="450" letter-spacing="0">+100 focused SKILL.md packages for Codex, Claude,</text>
