<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Skills social preview</title>
  <desc id="desc">Social preview for the Skills repository, featuring a liquid glass logo and concise project positioning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071016"/>
      <stop offset=".48" stop-color="#101C30"/>
      <stop offset="1" stop-color="#172016"/>
    </linearGradient>
    <radialGradient id="mint" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 108) rotate(52) scale(360 240)">
      <stop stop-color="#4EF0D2" stop-opacity=".42"/>
      <stop offset="1" stop-color="#4EF0D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 540) rotate(-128) scale(420 280)">
      <stop stop-color="#FFB84D" stop-opacity=".35"/>
      <stop offset="1" stop-color="#FFB84D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="113" y1="119" x2="381" y2="459" gradientUnits="userSpaceOnUse">
